<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FST · BDE Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1d1a;--ink-soft:#5c5f57;--paper:#f6f4ec;--card:#fffdf6;
  --line:#e0ddcf;--line-strong:#c9c5b2;
  --present:#1f7a4d;--present-bg:#e3f3e7;--present-line:#bfe3c9;
  --absent:#c0392b;--absent-bg:#fbe6e2;--absent-line:#f1c4bc;
  --hold:#6d57b8;--hold-bg:#ece7f7;--train:#2f5d8a;--train-bg:#e2ecf6;
  --future:#f1efe6;--accent:#d98324;
  --shadow:0 1px 2px rgba(40,38,28,.06),0 8px 24px rgba(40,38,28,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;font-size:15px}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
header{padding:32px 32px 20px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,4vw,40px);letter-spacing:-.01em;line-height:1.02}
h1 em{font-style:italic;color:var(--ink-soft)}
.sub{margin-top:10px;color:var(--ink-soft);max-width:640px;font-size:13.5px}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;padding:20px 32px;border-bottom:1px solid var(--line)}
.metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.metric:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.metric.green:before{background:var(--present)}
.metric .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600}
.metric .big{font-family:'Fraunces',serif;font-size:36px;font-weight:500;line-height:1;margin-top:8px}
.metric .big .unit{font-size:15px;color:var(--ink-soft);font-family:'Inter';font-weight:500}
.metric .sec{font-size:12.5px;color:var(--ink-soft);margin-top:7px;font-family:'JetBrains Mono',monospace}
.metric.green .big{color:var(--present)}
.metric .bar{height:5px;border-radius:3px;background:var(--line);margin-top:10px;overflow:hidden}
.metric .bar i{display:block;height:100%;background:var(--present)}

.controls{display:flex;flex-wrap:wrap;gap:10px 12px;align-items:center;padding:16px 32px;position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1px solid var(--line)}
.controls .grp{display:flex;align-items:center;gap:6px}
.controls label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600}
select,input[type=search],input[type=date]{font-family:inherit;font-size:13px;padding:7px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--card);color:var(--ink)}
input[type=search]{min-width:180px}
select:focus,input:focus{outline:2px solid var(--accent);outline-offset:1px}
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
.seg button{font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border:0;background:var(--card);color:var(--ink-soft);cursor:pointer}
.seg button.on{background:var(--ink);color:var(--paper)}
.chk{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;user-select:none}
.chk input{width:15px;height:15px;accent-color:var(--accent)}
.count{margin-left:auto;font-size:12px;color:var(--ink-soft)}
.count b{color:var(--ink);font-weight:600}

.wrap{padding:0 16px 50px;margin-top:8px;overflow:auto;max-height:calc(100vh - 70px)}
table{border-collapse:separate;border-spacing:0;min-width:100%}
th,td{white-space:nowrap}
thead th{position:sticky;top:0;background:var(--paper);z-index:20;padding:8px 6px;font-size:12.5px;font-weight:600;color:var(--ink-soft);text-align:center;border-bottom:1px solid var(--line-strong)}
thead th.day small{display:block;font-size:10.5px;font-weight:500;color:var(--ink-soft);opacity:.7}
thead th.day .mo{display:block;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);font-weight:600}
thead th.sun{color:var(--hold)}
thead th.mstart{border-left:2px solid var(--accent)}
th.name-h,td.name{position:sticky;left:0;z-index:15;background:var(--card);text-align:left;padding-left:16px;min-width:228px}
td.name{background:var(--card);border-bottom:1px solid var(--line)}
thead th.name-h{z-index:30;top:0;left:0;background:var(--paper)}
th.stat-h,td.statcol{position:sticky;z-index:14;background:var(--card);text-align:center;min-width:62px;width:62px;font-family:'JetBrains Mono',monospace;font-size:12px;border-bottom:1px solid var(--line);border-left:1px solid var(--line)}
td.statcol{color:var(--ink)}
th.stat-h{z-index:24;top:0;background:var(--paper);color:var(--ink-soft);font-weight:600;font-size:10.5px;line-height:1.15;padding:4px 4px}
th.stat-h small,td.statcol small{display:block;font-size:9px;color:var(--ink-soft);font-weight:500}
.statcol.s-m{left:228px}
.statcol.s-f{left:290px}
th.stat-h.s-m{left:228px}
th.stat-h.s-f{left:290px}
td.statcol.s-f{border-right:2px solid var(--line-strong)}
th.stat-h.s-f{border-right:2px solid var(--line-strong)}
.emp-name{font-weight:600;font-size:14.5px}
.emp-meta{font-size:11.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:1px}
td.cell{width:34px;height:46px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);position:relative;padding:0}
td.cell.mstart{border-left:2px solid var(--accent)}
td.cell .glyph{line-height:1;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;display:block}
td.cell.P{background:var(--present-bg);color:var(--present)}
td.cell.A{background:var(--absent-bg);color:var(--absent)}
td.cell.A.nologin{background:repeating-linear-gradient(45deg,var(--absent-bg),var(--absent-bg) 4px,#f6d3cc 4px,#f6d3cc 8px)}
td.cell.H{background:var(--hold-bg);color:var(--hold)}
td.cell.T{background:var(--train-bg);color:var(--train)}
td.cell.X{background:var(--future);color:transparent}
td.cell.pre{box-shadow:inset 0 0 0 1px var(--present-line)}
td.cell:hover{outline:2px solid var(--accent);outline-offset:-2px;z-index:5}
td.cell.has:after{content:"";position:absolute;right:3px;bottom:3px;width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.5}

#tip{position:fixed;z-index:200;pointer-events:none;background:var(--ink);color:var(--paper);border-radius:10px;padding:11px 13px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .12s;max-width:230px}
#tip .t-h{font-weight:600;margin-bottom:6px}
#tip .crit{display:flex;justify-content:space-between;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11.5px;margin:2px 0}
#tip .ok{color:#9be3b4}#tip .no{color:#f3a99e}
#tip .note{margin-top:6px;font-size:10.5px;opacity:.75;font-style:italic}
.legend{display:flex;flex-wrap:wrap;gap:16px;padding:16px 32px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft)}
.legend .key{display:flex;align-items:center;gap:7px}
.legend .sw{width:16px;height:16px;border-radius:5px;border:1px solid var(--line-strong)}
.note-foot{padding:6px 32px 40px;font-size:11.5px;color:var(--ink-soft);max-width:780px;font-style:italic}
@media(max-width:640px){header,.metrics,.controls,.legend,.note-foot{padding-left:16px;padding-right:16px}.count{width:100%;margin:6px 0 0}}

:root{--exit-bg:#fdf0e4;--exit-line:#e9c38f;--exit-ink:#b5722a}
td.cell .rev{display:block;font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;line-height:1;margin-top:1px;color:var(--present);opacity:.92}
td.cell.A .rev,td.cell.X .rev{color:#9a6b2a}
td.cell.hasrev{box-shadow:inset 0 -2px 0 rgba(31,122,77,.35)}
td.cell.exitcell{filter:saturate(.55)}
tr.exitrow td.name{background:var(--exit-bg)}
.tag.exit{display:inline-block;font-size:9px;padding:1px 5px;border-radius:5px;margin-left:6px;vertical-align:middle;background:var(--exit-line);color:#7a4a16;font-weight:600}
th.stat-h.s-rev,td.statcol.s-rev{left:228px}
th.stat-h.s-m,td.statcol.s-m{left:300px}
th.stat-h.s-f,td.statcol.s-f{left:362px}
td.statcol.s-f,th.stat-h.s-f{border-right:2px solid var(--line-strong)}
td.statcol.s-rev{color:var(--present);font-weight:600}
.ms{position:relative;display:inline-block}
.ms-btn{font-family:inherit;font-size:12.5px;font-weight:500;padding:7px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--card);color:var(--ink-soft);cursor:pointer}
.ms-btn.active{border-color:var(--accent);color:var(--ink);background:#fdf4e8}
.ms-cnt{color:var(--accent);font-weight:600}
.ms-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:60;background:var(--card);border:1px solid var(--line-strong);border-radius:10px;box-shadow:var(--shadow);padding:6px;min-width:150px;max-height:260px;overflow:auto}
.ms-pop.open{display:block}
.ms-opt{display:flex;align-items:center;gap:7px;padding:5px 8px;font-size:12.5px;border-radius:6px;cursor:pointer;white-space:nowrap}
.ms-opt:hover{background:var(--paper)}.ms-opt input{accent-color:var(--accent)}

</style>
</head>
<body>
<header>
  <div class="eyebrow">FST · Field Sales Team</div>
  <h1>BDE Attendance <em>Tracker</em></h1>
  <p class="sub">Daily present/absent by BDE. Present = 4+ validated meetings, sign-in before 11 AM, and followups cleared. Striped (∅) = no sign-in. Each cell shows daily revenue (₹). Live from Google Sheets, refreshing every 5 min. Filters are multi-select.</p>
</header>

<div class="metrics" id="metrics"></div>

<div class="controls">
  <div class="grp"><label>From</label><input type="date" id="from"></div>
  <div class="grp"><label>To</label><input type="date" id="to"></div>
  <div class="grp"><label>Month</label><select id="month"><option value="">All</option></select></div>
  <div class="ms" id="msCity"></div>
  <div class="ms" id="msTier"></div>
  <div class="ms" id="msVint"></div>
  <div class="ms" id="msLic"></div>
  <div class="seg" id="statusSeg"><button data-f="" class="on">All</button><button data-f="A">Absent</button><button data-f="P">Present</button></div>
  <label class="chk"><input type="checkbox" id="hideTrain"> Hide training</label>
  <label class="chk"><input type="checkbox" id="showExit"> Show exit</label>
  <input type="search" id="q" placeholder="Search name or ID…">
  <div class="count" id="count"></div>
  <div id="updated" style="display:none"></div>
</div>
</div>

<div class="wrap"><table id="grid"><thead></thead><tbody></tbody></table></div>

<div class="legend" id="legend"></div>
<p class="note-foot" id="footnote"></p>
<div id="tip"></div>

<script>

const ATT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIZrKuTJUdzshNzKht_KW70twLDExz7qC__iia1oYPE68KTeKlmcTrjiHjutOfsmlMfkuZTc1vX1af/pub?gid=316852425&single=true&output=csv";
const REV_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIZrKuTJUdzshNzKht_KW70twLDExz7qC__iia1oYPE68KTeKlmcTrjiHjutOfsmlMfkuZTc1vX1af/pub?gid=867698418&single=true&output=csv";
const MEETING_ENFORCED_FROM = "2026-06-04";
let DATA = null;
const BDE_DESIGS = {
  "senior business development executive":"Sr BDE","sr. business development executive":"Sr BDE",
  "business development executive":"BDE","subject matter expert - fst":"SME-FST","subject matter expert(sme)":"SME"
};
function parseCSV(text){const rows=[];let i=0,f='',row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c==='\r'){}else f+=c;}
    i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}return rows;}
function csvToObjects(text){const rows=parseCSV(text).filter(r=>r.length>1||(r.length===1&&r[0].trim()!==''));
  if(!rows.length)return [];const hdr=rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).map(r=>{const o={};hdr.forEach((h,i)=>o[h]=(r[i]??'').trim());return o;});}
function timeToMin(v){if(!v)return null;let s=String(v).trim();let dt=new Date(s.replace(' ','T'));
  if(!isNaN(dt)&&/\d{4}-\d{2}-\d{2}/.test(s))return dt.getHours()*60+dt.getMinutes();
  let m=s.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*(am|pm)?/i);
  if(m){let h=+m[1],mi=+m[2];const ap=(m[3]||'').toLowerCase();if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;return h*60+mi;}return null;}
function isoDate(v){let s=String(v).trim();let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  let dt=new Date(s);if(!isNaN(dt))return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;return null;}
function num(v){if(v==null||String(v).trim()==='')return null;const n=parseFloat(String(v).replace(/[^\d.-]/g,''));return isNaN(n)?null:Math.trunc(n);}
function inr(n){if(n==null)return '—';if(n>=1e7)return '₹'+(n/1e7).toFixed(2)+'Cr';if(n>=1e5)return '₹'+(n/1e5).toFixed(2)+'L';if(n>=1e3)return '₹'+(n/1e3).toFixed(1)+'k';return '₹'+n;}

function buildDATA(attObjs, revObjs){
  const aRows=attObjs.filter(r=>BDE_DESIGS[(r.designation__filter||'').toLowerCase()]);
  aRows.forEach(r=>r._iso=isoDate(r.date));
  const aValid=aRows.filter(r=>r._iso);
  if(!aValid.length) throw new Error('No BDE attendance rows with valid dates');
  const normName=n=>(n||'').toLowerCase().replace(/\./g,' ').replace(/\s+/g,' ').trim();
  const revByName={}, agentAttr={};
  revObjs.forEach(r=>{const key=normName(r.employee_name);if(!key)return;
    const iso=isoDate(r.payment_date);if(!iso)return;const amt=num(r.ttl_revenue)||0;
    const m=(revByName[key]=revByName[key]||{});const cell=(m[iso]=m[iso]||{rev:0,lic:{}});
    cell.rev+=amt;const st=(r.lic_status||'?');cell.lic[st]=(cell.lic[st]||0)+amt;
    const a=(agentAttr[key]=agentAttr[key]||{tier:new Set(),vintage:'',city:'',exit:'0'});
    if(r.tier)a.tier.add(r.tier);if(r.agent_vintage&&!a.vintage)a.vintage=r.agent_vintage;
    if(r.city&&!a.city)a.city=r.city;if(r.exit==='1')a.exit='1';});
  const aIsos=aValid.map(r=>r._iso).sort();const dmin=aIsos[0],dmax=aIsos[aIsos.length-1];
  const start=new Date(dmin+'T00:00:00'),end=new Date(dmax+'T00:00:00');
  const allDates=[];for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))allDates.push(new Date(d));
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const byEmp={},meta={};aValid.forEach(r=>{(byEmp[r.employee_id]=byEmp[r.employee_id]||{})[r._iso]=r;meta[r.employee_id]=r;});
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mon3=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=allDates.map(d=>({iso:fmt(d),d:d.getDate(),mon:mon3[d.getMonth()],dow:dow[d.getDay()],sun:d.getDay()===0,future:fmt(d)>dmax}));
  function evalCell(row,isoD,revCell){
    const rem=((row&&row.remarks)||'').toLowerCase();const status=((row&&row.status)||'').toLowerCase();
    const out={rev:revCell?revCell.rev:0,lic:revCell?revCell.lic:null};
    if(!row){out.code='X';return out;}
    if(rem.includes('week off')){out.code='H';return out;}
    if(rem.includes('training')){out.code='T';return out;}
    const smin=timeToMin(row.signintime);out.signin=smin==null?null:`${String(Math.floor(smin/60)).padStart(2,'0')}:${String(smin%60).padStart(2,'0')}`;out.signinMin=smin;
    const vam=num(row.validate_active_meetings);out.mc=vam==null?0:vam;const noLogin=smin==null;
    const fsN=num(row.followup_set),fdN=num(row.followups_done);
    out.fset=(fsN!=null&&fsN>0)?fsN:0;out.fdone=(fsN!=null&&fsN>0&&fdN!=null)?fdN:0;
    if(isoD<MEETING_ENFORCED_FROM){out.code=status==='active'?'P':'A';out.pre=true;if(out.code==='A'&&noLogin)out.nologin=true;return out;}
    const s=(!noLogin)&&(smin<11*60),m=out.mc>=4;let f=true;if(out.fset>0)f=out.fdone>=out.fset;
    out.code=(m&&s&&f)?'P':'A';out.m=m;out.s=s;out.f=f;if(out.code==='A'&&noLogin)out.nologin=true;return out;}
  const order=Object.values(meta).sort((a,b)=>((a.work_location__filter||'').localeCompare(b.work_location__filter||''))||((a.employee_name||'').localeCompare(b.employee_name||'')));
  const employees=order.map(mt=>{const eid=mt.employee_id,nkey=normName(mt.employee_name);
    const attr=agentAttr[nkey]||{tier:new Set(),vintage:'',city:'',exit:'0'};const revDays=revByName[nkey]||{};
    const cells=allDates.map(d=>{if(d.getDay()===0)return {code:'H'};const iso=fmt(d);const row=byEmp[eid][iso];const revCell=revDays[iso];
      if(!row&&!revCell)return {code:'X',future:iso>dmax,nodata:true};return evalCell(row,iso,revCell);});
    const city=attr.city||(mt.work_location__filter||'');
    return {id:eid,name:mt.employee_name,desig:BDE_DESIGS[(mt.designation__filter||'').toLowerCase()]||mt.designation__filter,
      loc:mt.work_location__filter,city,tiers:[...attr.tier],vintage:attr.vintage||'',exit:attr.exit==='1',cells};});
  const months=[...new Set(allDates.map(d=>fmt(d).slice(0,7)))].sort();
  const fullMonth=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const vintOrder=v=>{const n=v.replace('M','').replace('+','');return n===''?-1:(isNaN(+n)?98:+n);};
  return {rangeStart:dmin,rangeEnd:dmax,dataCutoff:dmax,generatedAt:new Date().toISOString(),days,employees,
    months:months.map(m=>({val:m,label:fullMonth[+m.split('-')[1]-1]+' '+m.split('-')[0]})),
    fCities:[...new Set(employees.map(e=>e.city).filter(c=>c&&c!=='other'))].sort(),
    fTiers:[...new Set([].concat(...employees.map(e=>e.tiers)))].sort(),
    fVint:[...new Set(employees.map(e=>e.vintage).filter(Boolean))].sort((a,b)=>vintOrder(a)-vintOrder(b)),
    fLic:[...new Set(revObjs.map(r=>r.lic_status).filter(Boolean))].sort()};
}


let fFrom='',fTo='',fMonth='',fStatus='',fQ='',fHideTrain=false,fShowExit=false;
let fCity=new Set(),fTier=new Set(),fVint=new Set(),fLic=new Set();
const fromEl=document.getElementById('from'),toEl=document.getElementById('to'),monthSel=document.getElementById('month');
function daysInMonth(ym){const y=+ym.slice(0,4),m=+ym.slice(5,7);return new Date(y,m,0).getDate();}
function isoOf(ym,d){return ym+'-'+String(d).padStart(2,'0');}
function cellIndex(){if(DATA._cidx)return DATA._cidx;const idx={};DATA.employees.forEach(e=>{const m={};e.cells.forEach((c,i)=>{m[DATA.days[i].iso]=c;});idx[e.id]=m;});DATA._cidx=idx;return idx;}
function visibleDayMetas(){if(fMonth){const n=daysInMonth(fMonth);const dataIso=new Set(DATA.days.map(d=>d.iso));const out=[];
    for(let d=1;d<=n;d++){const iso=isoOf(fMonth,d);const dt=new Date(iso+'T00:00:00');
      out.push({iso,d,mon:dt.toLocaleDateString('en-US',{month:'short'}),dow:dt.toLocaleDateString('en-US',{weekday:'short'}),sun:dt.getDay()===0,future:iso>DATA.dataCutoff,nodata:!dataIso.has(iso)});}return out;}
  return DATA.days.filter(dm=>dm.iso>=fFrom&&dm.iso<=fTo);}
function cellFor(empId,dm){if(dm.sun)return {code:'H'};const c=cellIndex()[empId][dm.iso];return c||{code:'X',future:dm.future,nodata:true};}
function cellRev(c){if(!c)return 0;if(fLic.size===0)return c.rev||0;if(!c.lic)return 0;let s=0;for(const k in c.lic){if(fLic.has(k))s+=c.lic[k];}return s;}
function empVisible(emp){if(!fShowExit&&emp.exit)return false;
  if(fQ){const s=(emp.name+' '+emp.id).toLowerCase();if(!s.includes(fQ))return false;}
  if(fCity.size&&!fCity.has(emp.city))return false;
  if(fVint.size&&!fVint.has(emp.vintage))return false;
  if(fTier.size&&!emp.tiers.some(t=>fTier.has(t)))return false;return true;}
function isActiveCell(c){return c&&c.code!=='H'&&c.code!=='T'&&c.code!=='X';}
function fmtTime(min){if(min==null)return '—';let h=Math.floor(min/60),m=min%60;return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;}
function agentStats(emp,dms){let meetSum=0,actDays=0,fDone=0,fSet=0,rev=0;
  dms.forEach(dm=>{if(dm.sun)return;const c=cellFor(emp.id,dm);rev+=cellRev(c);if(!isActiveCell(c))return;
    actDays++;meetSum+=(c.mc||0);fDone+=(c.fdone||0);fSet+=(c.fset||0);});
  return {actDays,avgMeet:actDays?meetSum/actDays:0,fDone,fSet,rev};}
function computeMetrics(){const dms=visibleDayMetas();
  let meetSum=0,actDays=0,signedMeet=0,signedDays=0,loginSum=0,loginCnt=0,present=0,evalDays=0,fDone=0,fSet=0,revTot=0;const agents=new Set();
  DATA.employees.forEach(emp=>{if(!empVisible(emp))return;
    dms.forEach(dm=>{if(dm.sun)return;const c=cellFor(emp.id,dm);revTot+=cellRev(c);if(!isActiveCell(c))return;
      actDays++;meetSum+=(c.mc||0);fDone+=(c.fdone||0);fSet+=(c.fset||0);
      if(c.code==='P'||c.code==='A'){evalDays++;if(c.code==='P')present++;}
      if(c.signinMin!=null){loginSum+=c.signinMin;loginCnt++;}
      if((c.mc||0)>=1){signedMeet+=c.mc;signedDays++;agents.add(emp.id);}});});
  return {avgMeet:actDays?meetSum/actDays:0,avgMeetSigned:signedDays?signedMeet/signedDays:0,agentCount:agents.size,
    avgLogin:loginCnt?Math.round(loginSum/loginCnt):null,presentRate:evalDays?Math.round(100*present/evalDays):0,
    present,evalDays,fDone,fSet,revTot};}
function renderMetrics(){const m=computeMetrics();
  document.getElementById('metrics').innerHTML=`
    <div class="metric green"><div class="lbl">Total revenue</div><div class="big">${inr(m.revTot)}</div><div class="sec">across visible agents & days</div></div>
    <div class="metric"><div class="lbl">Avg meetings / active day</div><div class="big">${m.avgMeet.toFixed(1)}<span class="unit"> / 4</span></div><div class="sec">Days w/ ≥1 meet: ${m.avgMeetSigned.toFixed(1)} · ${m.agentCount} agents</div><div class="bar"><i style="width:${Math.min(100,m.avgMeet/4*100)}%"></i></div></div>
    <div class="metric"><div class="lbl">Followups done / set</div><div class="big">${m.fDone}<span class="unit"> / ${m.fSet}</span></div><div class="sec">${m.fSet?Math.round(100*m.fDone/m.fSet):0}% completed</div></div>
    <div class="metric"><div class="lbl">Avg login time</div><div class="big">${fmtTime(m.avgLogin)}</div><div class="sec">Excludes no-login days</div></div>
    <div class="metric green"><div class="lbl">Present rate</div><div class="big">${m.presentRate}<span class="unit">%</span></div><div class="sec">${m.present} / ${m.evalDays} evaluated days</div><div class="bar"><i style="width:${m.presentRate}%"></i></div></div>`;}
function critLine(l,ok,d){return `<div class="crit"><span>${l}</span><span class="${ok?'ok':'no'}">${d}</span></div>`;}
function tipHTML(emp,dm,c){let h=`<div class="t-h">${emp.name} · ${dm.d} ${dm.mon} (${dm.dow})</div>`;
  if(emp.exit)h+=`<div class="note" style="color:#e0a04d">Exit manpower</div>`;
  if(c.code==='H')return h+'Holiday — Sunday off';
  if(c.code==='T')return h+'Training day';
  if(c.code==='X'&&!(c.rev>0))return h+'No data recorded';
  if(c.nologin){h+=`<div class="crit"><span>No sign-in</span><span class="no">absent</span></div>`;h+=`<div class="note">BDE did not log in — counts as absent</div>`;}
  else if(c.pre){h+=critLine('Sign-in',!!c.signin,c.signin||'no sign-in');h+=critLine('Meetings',c.mc>=1,(c.mc||0));h+=`<div class="note">Before meeting-check enforcement</div>`;}
  else if(c.code==='P'||c.code==='A'){h+=critLine('Meetings ≥4',c.m,(c.mc!=null?c.mc:0)+' / 4');h+=critLine('Sign-in <11AM',c.s,c.signin||'no sign-in');h+=critLine('Followups',c.f,c.fset>0?(c.fdone+' / '+c.fset):'none set');}
  const rv=cellRev(c);
  if(rv>0){h+=`<div class="crit" style="border-top:1px solid #444;margin-top:6px;padding-top:5px"><span>Revenue</span><span class="ok">${inr(rv)}</span></div>`;
    if(c.lic){for(const k in c.lic){if(fLic.size&&!fLic.has(k))continue;h+=`<div class="crit"><span style="opacity:.7">${k}</span><span style="opacity:.85">${inr(c.lic[k])}</span></div>`;}}}
  return h;}
function render(){if(!DATA)return;renderMetrics();
  const thead=document.querySelector('#grid thead'),tbody=document.querySelector('#grid tbody');
  const dms=visibleDayMetas();let prevMon=null;
  let hr='<tr><th class="name-h">BDE</th><th class="stat-h s-rev">Rev<small>total</small></th><th class="stat-h s-m">Mtg<small>/act day</small></th><th class="stat-h s-f">F-up<small>done/set</small></th>';
  dms.forEach(d=>{const ms=d.iso.slice(0,7)!==prevMon;prevMon=d.iso.slice(0,7);
    hr+=`<th class="day${d.sun?' sun':''}${ms?' mstart':''}">${ms?`<span class="mo">${d.mon}</span>`:''}${d.d}<small>${d.dow}</small></th>`;});
  hr+='</tr>';thead.innerHTML=hr;
  let shown=0,rows='';
  DATA.employees.forEach(emp=>{if(!empVisible(emp))return;
    if(fStatus&&!dms.some(dm=>cellFor(emp.id,dm).code===fStatus))return;shown++;
    const st=agentStats(emp,dms);const exitTag=emp.exit?'<span class="tag exit">EXIT</span>':'';
    let r=`<tr class="${emp.exit?'exitrow':''}"><td class="name"><div class="emp-name">${emp.name}${exitTag}</div><div class="emp-meta">${emp.id} · ${emp.desig} · ${emp.city||emp.loc}${emp.vintage?' · '+emp.vintage:''}</div></td>`
      +`<td class="statcol s-rev">${st.rev?inr(st.rev):'—'}</td><td class="statcol s-m">${st.actDays?st.avgMeet.toFixed(1):'—'}</td><td class="statcol s-f">${st.fSet?(st.fDone+'/'+st.fSet):'—'}</td>`;
    prevMon=null;
    dms.forEach(dm=>{const c=cellFor(emp.id,dm);const ms=dm.iso.slice(0,7)!==prevMon;prevMon=dm.iso.slice(0,7);
      let code=c.code;if(fHideTrain&&code==='T'){code='X';}
      const dim=fStatus&&code!==fStatus?'opacity:.26;':'';const rv=cellRev(c);
      let glyph=code==='P'?'P':code==='A'?(c.nologin?'∅':'A'):code==='H'?'·':code==='T'?'T':'';
      let revline=rv>0?`<span class="rev">${inr(rv)}</span>`:'';
      const has=(code==='P'||code==='A')&&!c.pre?' has':'';const exitcls=emp.exit?' exitcell':'';
      r+=`<td class="cell ${code}${c.pre?' pre':''}${c.nologin?' nologin':''}${ms?' mstart':''}${has}${exitcls}${rv>0?' hasrev':''}" style="${dim}" data-e="${emp.id}" data-iso="${dm.iso}"><span class="glyph">${glyph}</span>${revline}</td>`;});
    r+='</tr>';rows+=r;});
  tbody.innerHTML=rows||`<tr><td class="name" style="padding:24px;color:var(--ink-soft)">No BDEs match these filters.</td></tr>`;
  document.getElementById('count').innerHTML=`<b>${shown}</b>/${DATA.employees.length} BDEs · ${dms.length} days`;}
const tip=document.getElementById('tip'),grid=document.getElementById('grid');
grid.addEventListener('mouseover',ev=>{const td=ev.target.closest('td.cell');if(!td)return;
  const emp=DATA.employees.find(x=>x.id===td.dataset.e),iso=td.dataset.iso;
  const dm=visibleDayMetas().find(d=>d.iso===iso);const c=cellFor(emp.id,dm);
  if(c.code==='X'&&(c.future||c.nodata)&&!(c.rev>0))return;tip.innerHTML=tipHTML(emp,dm,c);tip.style.opacity='1';});
grid.addEventListener('mousemove',ev=>{if(tip.style.opacity!=='1')return;let x=ev.clientX+14,y=ev.clientY+14;const r=tip.getBoundingClientRect();
  if(x+r.width>innerWidth)x=ev.clientX-r.width-14;if(y+r.height>innerHeight)y=ev.clientY-r.height-14;tip.style.left=x+'px';tip.style.top=y+'px';});
grid.addEventListener('mouseout',ev=>{if(!ev.relatedTarget||!ev.relatedTarget.closest('td.cell'))tip.style.opacity='0';});
function buildMulti(containerId,label,values,setRef,fmtLabel){const wrap=document.getElementById(containerId);if(!wrap)return;
  wrap.innerHTML=`<button class="ms-btn" type="button">${label} <span class="ms-cnt"></span> ▾</button><div class="ms-pop"></div>`;
  const btn=wrap.querySelector('.ms-btn'),pop=wrap.querySelector('.ms-pop'),cnt=wrap.querySelector('.ms-cnt');
  pop.innerHTML=values.map(v=>`<label class="ms-opt"><input type="checkbox" value="${v}"> ${fmtLabel?fmtLabel(v):v}</label>`).join('')||'<div style="padding:8px;color:var(--ink-soft);font-size:12px">none</div>';
  function upd(){cnt.textContent=setRef.size?`(${setRef.size})`:'';btn.classList.toggle('active',setRef.size>0);}
  btn.onclick=()=>{pop.classList.toggle('open');};
  pop.querySelectorAll('input').forEach(cb=>cb.onchange=()=>{if(cb.checked)setRef.add(cb.value);else setRef.delete(cb.value);upd();render();});
  document.addEventListener('click',e=>{if(!wrap.contains(e.target))pop.classList.remove('open');});upd();}
function initFromData(){fFrom=DATA.rangeStart;fTo=DATA.rangeEnd;fromEl.min=toEl.min=DATA.rangeStart;fromEl.max=toEl.max=DATA.rangeEnd;
  fromEl.value=fFrom;toEl.value=fTo;monthSel.length=1;DATA.months.forEach(m=>{const o=document.createElement('option');o.value=m.val;o.textContent=m.label;monthSel.appendChild(o)});
  buildMulti('msCity','City',DATA.fCities,fCity,v=>v[0].toUpperCase()+v.slice(1));
  buildMulti('msTier','Tier',DATA.fTiers,fTier);buildMulti('msVint','Vintage',DATA.fVint,fVint);buildMulti('msLic','Lic status',DATA.fLic,fLic);}
fromEl.onchange=e=>{fFrom=e.target.value;if(fFrom>fTo){fTo=fFrom;toEl.value=fTo;}fMonth='';monthSel.value='';render();};
toEl.onchange=e=>{fTo=e.target.value;if(fTo<fFrom){fFrom=fTo;fromEl.value=fFrom;}fMonth='';monthSel.value='';render();};
monthSel.onchange=e=>{fMonth=e.target.value;if(fMonth){const n=daysInMonth(fMonth);fFrom=isoOf(fMonth,1);fTo=isoOf(fMonth,n);fromEl.value=fFrom;toEl.value=fTo;}else{fFrom=DATA.rangeStart;fTo=DATA.rangeEnd;fromEl.value=fFrom;toEl.value=fTo;}render();};
document.getElementById('q').oninput=e=>{fQ=e.target.value.trim().toLowerCase();render();};
document.getElementById('hideTrain').onchange=e=>{fHideTrain=e.target.checked;render();};
document.getElementById('showExit').onchange=e=>{fShowExit=e.target.checked;render();};
document.getElementById('statusSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;[...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');fStatus=b.dataset.f;render();});
document.getElementById('legend').innerHTML=`
  <div class="key"><span class="sw" style="background:var(--present-bg);border-color:var(--present-line)"></span> P · Present</div>
  <div class="key"><span class="sw" style="background:var(--absent-bg);border-color:var(--absent-line)"></span> A · Absent</div>
  <div class="key"><span class="sw" style="background:repeating-linear-gradient(45deg,var(--absent-bg),var(--absent-bg) 3px,#f6d3cc 3px,#f6d3cc 6px)"></span> ∅ · No sign-in</div>
  <div class="key"><span class="sw" style="background:var(--train-bg)"></span> T · Training</div>
  <div class="key"><span class="sw" style="background:var(--hold-bg)"></span> · Sunday</div>
  <div class="key"><span class="sw" style="background:var(--exit-bg);border-color:var(--exit-line)"></span> Exit manpower</div>
  <div class="key"><span style="font-family:'JetBrains Mono';color:var(--present);font-weight:600">₹</span> daily revenue in cell</div>`;
function setFootnote(){if(!DATA)return;document.getElementById('footnote').textContent=`Attendance ${DATA.rangeStart} to ${DATA.rangeEnd}; revenue summed per day from license sales. Active day = non-Sunday. Meeting check enforced from Jun 4. City "other" excluded from filters. Lic-status filter scopes revenue shown. Exit manpower hidden unless toggled.`;}
const REFRESH_MS = 5*60*1000;
async function fetchCSV(url){const res=await fetch(url+'&_='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);return res.text();}
async function boot(){
  try{
    const [att,rev]=await Promise.all([fetchCSV(ATT_CSV_URL),fetchCSV(REV_CSV_URL)]);
    DATA=buildDATA(csvToObjects(att),csvToObjects(rev));
    initFromData();render();setFootnote();markUpdated();
  }catch(e){
    document.getElementById('count').innerHTML='<span style="color:var(--absent)">Could not load sheets — '+e.message+'</span>';
  }
}
function markUpdated(){const el=document.getElementById('updated');if(!el)return;el.style.display='block';el.style.width='100%';el.style.fontSize='11px';el.style.color='var(--ink-soft)';el.style.marginTop='4px';el.textContent='Updated just now · auto-refreshes every 5 min';}
boot();
setInterval(boot, REFRESH_MS);

</script>
